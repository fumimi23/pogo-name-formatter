<style>

<body>
  <main class="card">
    <h1>ポケモンGO 個体値ネーム変換</h1>
    <p class="lead">
      個体値（攻撃・防御・HP）から、ニックネーム用の「割合＋16進数」の名前を作ります。<br>
      例: 攻撃15・防御14・HP13 → <b>93.3 FED</b>（割合93.3% / 16進 F・E・D）
    </p>
    <details class="howto">
      <summary>使い方</summary>
      <ul>
        <li><b>手入力</b>: 数字をタップ、または ＋− で 攻撃／防御／HP を指定</li>
        <li><b>スクショ</b>: 鑑定画面を読み込み、各バー（攻撃→防御→HP）をタップ</li>
        <li>カンスト（15/15/15）は文字数節約のため <code>100.0</code> ではなく <code>99.9</code> 表記</li>
      </ul>
    </details>

    <section class="shot">
      <div class="shot-head">📷 スクショから読み取る</div>
      <input type="file" id="file" accept="image/*">
      <p class="shot-hint" id="selectHint" style="display:none"></p>
      <div class="stage" id="stage" style="display:none"><canvas id="view"></canvas></div>
      <div class="slider-row" id="sliderRow" style="display:none">
        <label for="thr">色の感度</label>
        <input type="range" id="thr" min="20" max="150" value="60">
        <output id="thrOut">60</output>
      </div>
    </section>

    <div class="stat" data-stat="attack">
      <div class="stat-row">
        <label>攻撃</label>
        <button type="button" class="step" data-delta="-1" aria-label="攻撃を減らす">−</button>
        <button type="button" class="value" aria-haspopup="listbox" aria-expanded="false" aria-controls="picker-attack" aria-label="攻撃の値を選ぶ">15</button>
        <button type="button" class="step" data-delta="1" aria-label="攻撃を増やす">＋</button>
      </div>
      <div class="picker" id="picker-attack" role="listbox" aria-label="攻撃の個体値" hidden></div>
    </div>
    <div class="stat" data-stat="defense">
      <div class="stat-row">
        <label>防御</label>
        <button type="button" class="step" data-delta="-1" aria-label="防御を減らす">−</button>
        <button type="button" class="value" aria-haspopup="listbox" aria-expanded="false" aria-controls="picker-defense" aria-label="防御の値を選ぶ">15</button>
        <button type="button" class="step" data-delta="1" aria-label="防御を増やす">＋</button>
      </div>
      <div class="picker" id="picker-defense" role="listbox" aria-label="防御の個体値" hidden></div>
    </div>
    <div class="stat" data-stat="hp">
      <div class="stat-row">
        <label>HP</label>
        <button type="button" class="step" data-delta="-1" aria-label="HPを減らす">−</button>
        <button type="button" class="value" aria-haspopup="listbox" aria-expanded="false" aria-controls="picker-hp" aria-label="HPの値を選ぶ">15</button>
        <button type="button" class="step" data-delta="1" aria-label="HPを増やす">＋</button>
      </div>
      <div class="picker" id="picker-hp" role="listbox" aria-label="HPの個体値" hidden></div>
    </div>

    <div class="result-box">
      <p class="result-label">名前</p>
      <div class="result" id="result">99.9 FFF</div>
    </div>
    <button type="button" id="copy" aria-live="polite">名前をコピー</button>

    <p class="repo">
      <a href="https://github.com/fumimi23/pogo-name-formatter" target="_blank" rel="noopener noreferrer" aria-label="ソースコード（GitHub・新規タブで開く）">ソースコード (GitHub)</a>
    </p>
  </main>

<script>
  const MIN = 0, MAX = 15;
  const iv = { attack: 15, defense: 15, hp: 15 };
  const stats = document.querySelectorAll('.stat');
  const STATS = ['attack', 'defense', 'hp'];
  const LABEL = { attack: '攻撃', defense: '防御', hp: 'HP' };
  // スクショ解析: 空きトラック(灰)とみなす明るさ範囲。白いカード地/区切り(≈255)は除外。
  const TRACK_LO = 200, TRACK_HI = 245, NEUTRAL = 30;

  function clampIV(v) { return Math.max(MIN, Math.min(MAX, v)); }

  // 色つき列数と灰色列数の比から個体値(0〜15)を出す。白い区切りは数えない。
  function ivFromCounts(fill, grey) {
    const total = fill + grey;
    if (total <= 0) return 0;
    return clampIV(Math.round(15 * fill / total));
  }

  // RGB の鮮やかさ(オレンジ/赤は大、灰/白は小)
  function colorfulness(r, g, b) { return Math.max(r, g, b) - Math.min(r, g, b); }

  // 1列の平均色を fill(塗り) / grey(空きトラック) / bg(白い区切り) に分類
  function classifyColumn(meanCf, meanBr, fillThreshold) {
    if (meanCf >= fillThreshold) return 'fill';
    if (meanCf < NEUTRAL && meanBr >= TRACK_LO && meanBr <= TRACK_HI) return 'grey';
    return 'bg';
  }

  // 真偽配列上で start を含む連続領域を、gapTol までの隙間を跨いで広げ {lo,hi} を返す
  function growSpan(flags, start, gapTol) {
    const n = flags.length;
    let lo = start, hi = start, run = 0;
    for (let i = start + 1; i < n; i++) {
      if (flags[i]) { hi = i; run = 0; } else if (++run > gapTol) break;
    }
    run = 0;
    for (let i = start - 1; i >= 0; i--) {
      if (flags[i]) { lo = i; run = 0; } else if (++run > gapTol) break;
    }
    return { lo, hi };
  }

  function formatName(a, d, h) {
    // 100.0(15/15/15)のときだけ5文字になるため、文字数節約で 99.9 に置き換える
    let ratio = ((a + d + h) / 45 * 100).toFixed(1);
    if (ratio === '100.0') ratio = '99.9';
    const hex = [a, d, h].map(v => v.toString(16).toUpperCase()).join('');
    return ratio + ' ' + hex;
  }

  // 0〜15 の選択ボタンを各ステータスに生成
  stats.forEach(stat => {
    const picker = stat.querySelector('.picker');
    for (let v = MIN; v <= MAX; v++) {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'pick';
      b.dataset.val = v;
      b.textContent = v;
      b.setAttribute('role', 'option');
      b.setAttribute('aria-selected', 'false');
      picker.appendChild(b);
    }
  });

  function closePickers(except) {
    stats.forEach(stat => {
      if (stat !== except) {
        stat.querySelector('.picker').hidden = true;
        stat.querySelector('.value').setAttribute('aria-expanded', 'false');
      }
    });
  }

  function render() {
    stats.forEach(stat => {
      const v = iv[stat.dataset.stat];
      stat.querySelector('.value').textContent = v;
      stat.querySelectorAll('.step').forEach(btn => {
        const next = v + Number(btn.dataset.delta);
        btn.disabled = next < MIN || next > MAX;
      });
      stat.querySelectorAll('.pick').forEach(b => {
        const on = Number(b.dataset.val) === v;
        b.classList.toggle('selected', on);
        b.setAttribute('aria-selected', String(on));
      });
    });
    document.getElementById('result').textContent =
      formatName(iv.attack, iv.defense, iv.hp);
  }

  stats.forEach(stat => {
    const name = stat.dataset.stat;
    const valueBtn = stat.querySelector('.value');
    const picker = stat.querySelector('.picker');

    stat.querySelectorAll('.step').forEach(btn => {
      btn.addEventListener('click', () => {
        iv[name] = Math.min(MAX, Math.max(MIN, iv[name] + Number(btn.dataset.delta)));
        render();
      });
    });

    valueBtn.addEventListener('click', () => {
      const willOpen = picker.hidden;
      closePickers(stat);
      picker.hidden = !willOpen;
      valueBtn.setAttribute('aria-expanded', String(willOpen));
    });

    picker.addEventListener('click', e => {
      const b = e.target.closest('.pick');
      if (!b) return;
      iv[name] = Number(b.dataset.val);
      picker.hidden = true;
      valueBtn.setAttribute('aria-expanded', 'false');
      render();
    });
  });

  // ステータス以外をタップしたら選択パネルを閉じる
  document.addEventListener('click', e => {
    if (!e.target.closest('.stat')) closePickers(null);
  });

  render();

  // ===== スクショから読み取る(画素解析で個体値を推定し、上の手入力UIに反映) =====
  const fileInput = document.getElementById('file');
  const stage = document.getElementById('stage');
  const view = document.getElementById('view');
  const vctx = view.getContext('2d');
  const offc = document.createElement('canvas');
  const octx = offc.getContext('2d', { willReadFrequently: true });
  const sliderRow = document.getElementById('sliderRow');
  const selectHint = document.getElementById('selectHint');
  const thr = document.getElementById('thr');
  const thrOut = document.getElementById('thrOut');

  let shotImg = null, shotScale = 1, shotW = 0, shotH = 0, shotData = null;
  let tapOrder = [];
  const taps = {}, rois = {};

  function at(x, y) { const o = (y * shotW + x) * 4; return [shotData[o], shotData[o + 1], shotData[o + 2]]; }
  function isBarPixel(x, y, fillT) {
    const [r, g, b] = at(x, y);
    const c = colorfulness(r, g, b), br = (r + g + b) / 3;
    return c >= fillT || (c < NEUTRAL && br >= TRACK_LO && br <= TRACK_HI);
  }
  function bigEnough(roi) { return roi && roi.w >= 16 && roi.h >= 5; }

  fileInput.addEventListener('change', () => {
    const f = fileInput.files && fileInput.files[0];
    if (!f) return;
    const url = URL.createObjectURL(f);
    const im = new Image();
    im.onerror = () => {
      URL.revokeObjectURL(url);
      alert('この画像を読み込めませんでした。PNG / JPEG をお試しください（HEIC は未対応の場合があります）。');
    };
    im.onload = () => {
      URL.revokeObjectURL(url);
      shotImg = im; shotW = im.naturalWidth; shotH = im.naturalHeight;
      offc.width = shotW; offc.height = shotH; octx.drawImage(im, 0, 0);
      shotData = octx.getImageData(0, 0, shotW, shotH).data;
      shotScale = Math.min(440, shotW) / shotW;
      view.width = Math.round(shotW * shotScale);
      view.height = Math.round(shotH * shotScale);
      startSelection();
    };
    im.src = url;
  });

  function startSelection() {
    tapOrder = STATS.slice();
    for (const s of STATS) { delete taps[s]; delete rois[s]; }
    stage.style.display = 'block';
    sliderRow.style.display = 'flex';
    selectHint.style.display = 'block';
    redrawShot();
    updateShotHint();
  }
  function updateShotHint() {
    selectHint.textContent = tapOrder.length
      ? `→ いま「${LABEL[tapOrder[0]]}」のバーをタップ`
      : '読み取り完了。ズレたら下の ± で調整できます';
  }
  function redrawShot() {
    vctx.drawImage(shotImg, 0, 0, view.width, view.height);
    for (const s of STATS) if (rois[s]) drawShotBox(rois[s], LABEL[s]);
  }
  function drawShotBox(r, text) {
    const x = r.x * shotScale, y = r.y * shotScale, w = r.w * shotScale, h = r.h * shotScale;
    vctx.lineWidth = 2; vctx.strokeStyle = '#1f6feb'; vctx.setLineDash([]);
    vctx.strokeRect(x, y, w, h);
    vctx.font = 'bold 12px sans-serif'; vctx.fillStyle = '#1f6feb';
    vctx.fillText(text, x + 3, y - 4 < 10 ? y + 14 : y - 4);
  }
  function shotToImg(ev) {
    const rect = view.getBoundingClientRect();
    const px = (ev.clientX - rect.left) * (view.width / rect.width);
    const py = (ev.clientY - rect.top) * (view.height / rect.height);
    return { x: Math.round(px / shotScale), y: Math.round(py / shotScale) };
  }
  function detect(tx, ty, fillT) {
    tx = Math.max(0, Math.min(shotW - 1, tx)); ty = Math.max(0, Math.min(shotH - 1, ty));
    if (!isBarPixel(tx, ty, fillT)) {
      for (let d = 1; d <= 60; d++) {
        if (tx - d >= 0 && isBarPixel(tx - d, ty, fillT)) { tx -= d; break; }
        if (tx + d < shotW && isBarPixel(tx + d, ty, fillT)) { tx += d; break; }
      }
    }
    if (!isBarPixel(tx, ty, fillT)) return null;
    const rowFlags = new Array(shotW);
    for (let x = 0; x < shotW; x++) rowFlags[x] = isBarPixel(x, ty, fillT);
    const hs = growSpan(rowFlags, tx, 30);
    let cx = Math.round((hs.lo + hs.hi) / 2);
    if (!isBarPixel(cx, ty, fillT)) cx = tx;
    const colFlags = new Array(shotH);
    for (let y = 0; y < shotH; y++) colFlags[y] = isBarPixel(cx, y, fillT);
    const vs = growSpan(colFlags, ty, 4);
    return { x: hs.lo, y: vs.lo, w: hs.hi - hs.lo + 1, h: vs.hi - vs.lo + 1 };
  }
  function analyzeRoi(roi, fillT) {
    const { x: x0, y: y0, w, h } = roi;
    if (w <= 0 || h <= 0) return 0;
    const ya = Math.floor(y0 + h * 0.25), yb = Math.max(ya + 1, Math.ceil(y0 + h * 0.75));
    let fill = 0, grey = 0;
    for (let i = 0; i < w; i++) {
      const x = x0 + i; let sumC = 0, sumB = 0, cnt = 0;
      for (let y = ya; y < yb; y++) {
        const [r, g, b] = at(x, y);
        sumC += colorfulness(r, g, b); sumB += (r + g + b) / 3; cnt++;
      }
      const cls = classifyColumn(sumC / cnt, sumB / cnt, fillT);
      if (cls === 'fill') fill++; else if (cls === 'grey') grey++;
    }
    return ivFromCounts(fill, grey);
  }
  function applyShotValues() {
    const fillT = Number(thr.value);
    for (const s of STATS) {
      if (!taps[s]) continue;
      const roi = detect(taps[s].x, taps[s].y, fillT);
      if (bigEnough(roi)) rois[s] = roi;
      if (!rois[s]) continue;
      iv[s] = analyzeRoi(rois[s], fillT);
    }
    redrawShot();
    closePickers(null);
    render();
  }
  view.addEventListener('click', (ev) => {
    if (!shotImg || tapOrder.length === 0) return;
    const p = shotToImg(ev);
    const stat = tapOrder[0];
    const roi = detect(p.x, p.y, Number(thr.value));
    if (!bigEnough(roi)) {
      selectHint.textContent = `「${LABEL[stat]}」のバーを認識できませんでした。バーの中央あたりをもう一度タップ`;
      return;
    }
    tapOrder.shift(); taps[stat] = p; rois[stat] = roi;
    applyShotValues();
    updateShotHint();
  });
  thr.addEventListener('input', () => {
    thrOut.textContent = thr.value;
    if (Object.keys(taps).length) applyShotValues();
  });

  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    let ok = false;
    try { ok = document.execCommand('copy'); } catch (e) { ok = false; }
    document.body.removeChild(ta);
    return ok;
  }

  const copyBtn = document.getElementById('copy');
  let copyTimer = null;
  async function copyName() {
    const text = document.getElementById('result').textContent;
    let ok = false;
    if (navigator.clipboard && window.isSecureContext) {
      try { await navigator.clipboard.writeText(text); ok = true; }
      catch (e) { ok = false; }
    }
    if (!ok) ok = fallbackCopy(text);

    copyBtn.textContent = ok ? 'コピーしました ✓' : 'コピーできませんでした';
    copyBtn.classList.toggle('done', ok);
    clearTimeout(copyTimer);
    copyTimer = setTimeout(() => {
      copyBtn.textContent = '名前をコピー';
      copyBtn.classList.remove('done');
    }, 1500);
  }
  copyBtn.addEventListener('click', copyName);

  // PWA: Service Worker を登録(オフライン対応)。非対応・file:// 等では何もしない。
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
