<style>
  :root {
    --bg: #f0f3f7;
    --card: #ffffff;
    --ink: #1c2530;
    --sub: #525c6c;
    --accent: #1f6feb;
    --accent-ink: #ffffff;
    --line: #dde3ec;
    --btn: #eef2f8;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    padding: 24px 16px calc(24px + env(safe-area-inset-bottom));
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Kaku Gothic ProN",
                 "Noto Sans JP", "Yu Gothic", Meiryo, sans-serif;
  }
  .card {
    width: 100%;
    max-width: 420px;
    background: var(--card);
    border-radius: 18px;
    box-shadow: 0 6px 24px rgba(28, 37, 48, 0.08);
    padding: 20px;
  }
  h1 {
    margin: 0 0 4px;
    font-size: 1.15rem;
    text-align: center;
  }
  .hint {
    margin: 0 0 20px;
    text-align: center;
    font-size: 0.78rem;
    color: var(--sub);
  }

  .stat {
    padding: 10px 0;
    border-top: 1px solid var(--line);
  }
  .stat:first-of-type { border-top: none; }
  .stat-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .stat-row label {
    flex: 1;
    font-size: 1.05rem;
    font-weight: 600;
  }
  .step {
    flex: 0 0 auto;
    width: 52px;
    height: 52px;
    border: none;
    border-radius: 14px;
    background: var(--btn);
    color: var(--ink);
    font-size: 1.6rem;
    line-height: 1;
    cursor: pointer;
    touch-action: manipulation;
    user-select: none;
  }
  .step:active { background: #dce3ee; transform: scale(0.94); }
  .step:disabled { opacity: 0.35; cursor: default; }
  .value {
    flex: 0 0 auto;
    min-width: 2.6em;
    height: 52px;
    padding: 0 10px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: #fff;
    color: var(--ink);
    font-size: 1.6rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    cursor: pointer;
    touch-action: manipulation;
  }
  .value:active { background: #f1f4f9; }
  .value[aria-expanded="true"] { border-color: var(--accent); background: #eef4ff; }

  .picker {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-top: 12px;
  }
  .picker[hidden] { display: none; }
  .pick {
    height: 48px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: #fff;
    color: var(--ink);
    font-size: 1.1rem;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    cursor: pointer;
    touch-action: manipulation;
  }
  .pick:active { background: #f1f4f9; }
  .pick.selected {
    background: var(--accent);
    border-color: var(--accent);
    color: var(--accent-ink);
  }

  .result-box {
    margin-top: 22px;
    padding: 18px 14px;
    border-radius: 14px;
    background: #f6f8fc;
    border: 1px solid var(--line);
    text-align: center;
  }
  .result-label {
    margin: 0 0 6px;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    color: var(--sub);
  }
  .result {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: 0.02em;
    word-break: break-all;
    user-select: all;
  }

  #copy {
    margin-top: 14px;
    width: 100%;
    height: 56px;
    border: none;
    border-radius: 14px;
    background: var(--accent);
    color: var(--accent-ink);
    font-size: 1.05rem;
    font-weight: 700;
    cursor: pointer;
    touch-action: manipulation;
  }
  #copy:active { filter: brightness(0.92); }
  #copy.done { background: #1a9e57; }
</style>
</head>
<body>
  <main class="card">
    <h1>ポケモンGO 個体値ネーム変換</h1>
    <p class="hint">数字をタップして直接選ぶか、＋−で調整できます</p>

    <div class="stat" data-stat="attack">
      <div class="stat-row">
        <label>攻撃</label>
        <button type="button" class="step" data-delta="-1" aria-label="攻撃を減らす">−</button>
        <button type="button" class="value" aria-haspopup="listbox" aria-expanded="false" aria-controls="picker-attack" aria-label="攻撃の値を選ぶ">15</button>
        <button type="button" class="step" data-delta="1" aria-label="攻撃を増やす">＋</button>
      </div>
      <div class="picker" id="picker-attack" role="listbox" aria-label="攻撃の個体値" hidden></div>
    </div>
    <div class="stat" data-stat="defense">
      <div class="stat-row">
        <label>防御</label>
        <button type="button" class="step" data-delta="-1" aria-label="防御を減らす">−</button>
        <button type="button" class="value" aria-haspopup="listbox" aria-expanded="false" aria-controls="picker-defense" aria-label="防御の値を選ぶ">15</button>
        <button type="button" class="step" data-delta="1" aria-label="防御を増やす">＋</button>
      </div>
      <div class="picker" id="picker-defense" role="listbox" aria-label="防御の個体値" hidden></div>
    </div>
    <div class="stat" data-stat="hp">
      <div class="stat-row">
        <label>HP</label>
        <button type="button" class="step" data-delta="-1" aria-label="HPを減らす">−</button>
        <button type="button" class="value" aria-haspopup="listbox" aria-expanded="false" aria-controls="picker-hp" aria-label="HPの値を選ぶ">15</button>
        <button type="button" class="step" data-delta="1" aria-label="HPを増やす">＋</button>
      </div>
      <div class="picker" id="picker-hp" role="listbox" aria-label="HPの個体値" hidden></div>
    </div>

    <div class="result-box">
      <p class="result-label">名前</p>
      <div class="result" id="result">99.9 FFF</div>
    </div>
    <button type="button" id="copy" aria-live="polite">名前をコピー</button>
  </main>

<script>
  const MIN = 0, MAX = 15;
  const iv = { attack: 15, defense: 15, hp: 15 };
  const stats = document.querySelectorAll('.stat');

  function formatName(a, d, h) {
    // 100.0(15/15/15)のときだけ5文字になるため、文字数節約で 99.9 に置き換える
    let ratio = ((a + d + h) / 45 * 100).toFixed(1);
    if (ratio === '100.0') ratio = '99.9';
    const hex = [a, d, h].map(v => v.toString(16).toUpperCase()).join('');
    return ratio + ' ' + hex;
  }

  // 0〜15 の選択ボタンを各ステータスに生成
  stats.forEach(stat => {
    const picker = stat.querySelector('.picker');
    for (let v = MIN; v <= MAX; v++) {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'pick';
      b.dataset.val = v;
      b.textContent = v;
      b.setAttribute('role', 'option');
      b.setAttribute('aria-selected', 'false');
      picker.appendChild(b);
    }
  });

  function closePickers(except) {
    stats.forEach(stat => {
      if (stat !== except) {
        stat.querySelector('.picker').hidden = true;
        stat.querySelector('.value').setAttribute('aria-expanded', 'false');
      }
    });
  }

  function render() {
    stats.forEach(stat => {
      const v = iv[stat.dataset.stat];
      stat.querySelector('.value').textContent = v;
      stat.querySelectorAll('.step').forEach(btn => {
        const next = v + Number(btn.dataset.delta);
        btn.disabled = next < MIN || next > MAX;
      });
      stat.querySelectorAll('.pick').forEach(b => {
        const on = Number(b.dataset.val) === v;
        b.classList.toggle('selected', on);
        b.setAttribute('aria-selected', String(on));
      });
    });
    document.getElementById('result').textContent =
      formatName(iv.attack, iv.defense, iv.hp);
  }

  stats.forEach(stat => {
    const name = stat.dataset.stat;
    const valueBtn = stat.querySelector('.value');
    const picker = stat.querySelector('.picker');

    stat.querySelectorAll('.step').forEach(btn => {
      btn.addEventListener('click', () => {
        iv[name] = Math.min(MAX, Math.max(MIN, iv[name] + Number(btn.dataset.delta)));
        render();
      });
    });

    valueBtn.addEventListener('click', () => {
      const willOpen = picker.hidden;
      closePickers(stat);
      picker.hidden = !willOpen;
      valueBtn.setAttribute('aria-expanded', String(willOpen));
    });

    picker.addEventListener('click', e => {
      const b = e.target.closest('.pick');
      if (!b) return;
      iv[name] = Number(b.dataset.val);
      picker.hidden = true;
      valueBtn.setAttribute('aria-expanded', 'false');
      render();
    });
  });

  // ステータス以外をタップしたら選択パネルを閉じる
  document.addEventListener('click', e => {
    if (!e.target.closest('.stat')) closePickers(null);
  });

  render();

  function fallbackCopy(text) {
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    let ok = false;
    try { ok = document.execCommand('copy'); } catch (e) { ok = false; }
    document.body.removeChild(ta);
    return ok;
  }

  const copyBtn = document.getElementById('copy');
  let copyTimer = null;
  async function copyName() {
    const text = document.getElementById('result').textContent;
    let ok = false;
    if (navigator.clipboard && window.isSecureContext) {
      try { await navigator.clipboard.writeText(text); ok = true; }
      catch (e) { ok = false; }
    }
    if (!ok) ok = fallbackCopy(text);

    copyBtn.textContent = ok ? 'コピーしました ✓' : 'コピーできませんでした';
    copyBtn.classList.toggle('done', ok);
    clearTimeout(copyTimer);
    copyTimer = setTimeout(() => {
      copyBtn.textContent = '名前をコピー';
      copyBtn.classList.remove('done');
    }, 1500);
  }
  copyBtn.addEventListener('click', copyName);

  // PWA: Service Worker を登録(オフライン対応)。非対応・file:// 等では何もしない。
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(() => {});
    });
  }
</script>
</body>
</html>
